<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Đường sắt Kyoto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Thiết lập bản đồ chiếm toàn bộ màn hình */
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Khởi tạo bản đồ, set tọa độ trung tâm là Kyoto và mức zoom là 13
        const map = L.map('map').setView([35.0116, 135.7681], 13);

        // 2. Thêm lớp bản đồ nền từ OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Đọc dữ liệu từ file JSON
        fetch('kyoto_graph_weight_ver1.json')
            .then(response => response.json())
            .then(data => {
                const nodes = data.nodes;
                const adjacencyList = data.adjacency_list;

                // Set này dùng để tránh vẽ đè một đoạn đường ray 2 chiều (u->v và v->u)
                const drawnEdges = new Set();

                // 4. Vẽ các tuyến đường ray (Edges)
                for (const u in adjacencyList) {
                    for (const v in adjacencyList[u]) {
                        // Tạo ID duy nhất cho mỗi cạnh để kiểm tra trùng lặp
                        const edgeId = u < v ? `${u}-${v}` : `${v}-${u}`;
                        
                        if (!drawnEdges.has(edgeId)) {
                            drawnEdges.add(edgeId);
                            
                            // Lấy tọa độ của 2 điểm u và v
                            if (nodes[u] && nodes[v]) {
                                const latlngs = [
                                    [nodes[u].lat, nodes[u].lon],
                                    [nodes[v].lat, nodes[v].lon]
                                ];
                                
                                // Vẽ đường gấp khúc (Polyline) nối 2 điểm
                                L.polyline(latlngs, {
                                    color: '#2563eb', // Màu xanh dương
                                    weight: 3,        // Độ dày của nét
                                    opacity: 0.7
                                }).addTo(map);
                            }
                        }
                    }
                }

                // 5. Vẽ các nhà ga (Stations)
                for (const nodeId in nodes) {
                    const node = nodes[nodeId];
                    
                    // Chỉ vẽ marker nếu node này là nhà ga
                    if (node.is_station) {
                        // Dùng CircleMarker để tạo các chấm tròn đại diện cho ga
                        L.circleMarker([node.lat, node.lon], {
                            radius: 6,
                            fillColor: "#ef4444", // Màu đỏ
                            color: "#ffffff",     // Viền trắng
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        }).addTo(map)
                        // Hiển thị tên nhà ga khi click vào chấm đỏ
                        .bindPopup(`<b>${node.name}</b><br>ID: ${nodeId}`);
                    }
                }
            })
            .catch(error => {
                console.error('Lỗi khi tải file JSON:', error);
                alert("Không thể tải kyoto_graph.json. Hãy chắc chắn bạn đang chạy qua Local Server!");
            });
    </script>
</body>
</html>
