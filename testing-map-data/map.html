<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Tìm đường - Kyoto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([35.0116, 135.7681], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Tải ĐỒNG THỜI bản đồ gốc và file lộ trình vừa tìm được
        Promise.all([
            fetch('kyoto_graph_weight_ver1.json').then(res => res.json()), // Nhớ đổi tên file cho đúng
            fetch('shortest_path.json').then(res => res.json())
        ])
        .then(([graphData, pathIds]) => {
            const nodes = graphData.nodes;
            const adjacencyList = graphData.adjacency_list;

            // 1. VẼ MẠNG LƯỚI GỐC (Nét mờ màu xám)
            const drawnEdges = new Set();
            for (const u in adjacencyList) {
                for (const v in adjacencyList[u]) {
                    const edgeId = u < v ? `${u}-${v}` : `${v}-${u}`;
                    if (!drawnEdges.has(edgeId)) {
                        drawnEdges.add(edgeId);
                        if (nodes[u] && nodes[v]) {
                            L.polyline([
                                [nodes[u].lat, nodes[u].lon],
                                [nodes[v].lat, nodes[v].lon]
                            ], {
                                color: '#9ca3af', // Màu xám nhạt
                                weight: 2,
                                opacity: 0.5
                            }).addTo(map);
                        }
                    }
                }
            }

            // 2. VẼ LỘ TRÌNH NGẮN NHẤT (Nét đậm màu đỏ)
            const pathCoordinates = [];
            for (const id of pathIds) {
                if (nodes[id]) {
                    pathCoordinates.push([nodes[id].lat, nodes[id].lon]);
                }
            }

            if (pathCoordinates.length > 0) {
                const pathLine = L.polyline(pathCoordinates, {
                    color: '#ef4444', // Màu đỏ rực rỡ
                    weight: 6,        // Nét cực dày
                    opacity: 1
                }).addTo(map);

                // Tự động zoom và căn giữa màn hình vừa khít với đường đi
                map.fitBounds(pathLine.getBounds());

                // Ghim Ga Xuất Phát (Màu xanh lá)
                const startId = pathIds[0];
                L.circleMarker(pathCoordinates[0], {
                    radius: 8, fillColor: "#22c55e", color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(map).bindPopup(`<b>Điểm xuất phát</b><br>${nodes[startId].name || 'Track Node'}`);

                // Ghim Ga Đích (Màu đỏ)
                const endId = pathIds[pathIds.length - 1];
                L.circleMarker(pathCoordinates[pathCoordinates.length - 1], {
                    radius: 8, fillColor: "#ef4444", color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(map).bindPopup(`<b>Điểm đích</b><br>${nodes[endId].name || 'Track Node'}`);
            }
        })
        .catch(error => {
            console.error('Lỗi tải dữ liệu:', error);
            alert("Lỗi tải file. Hãy chắc chắn đã chạy bằng Local Server (Live Server / Python http.server) và đã sinh ra file shortest_path.json");
        });
    </script>
</body>
</html>
