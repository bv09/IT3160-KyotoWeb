<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Tìm đường - Kyoto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([35.0116, 135.7681], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Tải ĐỒNG THỜI bản đồ gốc và file lộ trình vừa tìm được
        Promise.all([
            fetch('kyoto_graph_weight_ver1.json').then(res => res.json()), // Nhớ đổi tên file cho đúng
            fetch('shortest_path.json').then(res => res.json())
        ])
        .then(([graphData, pathIds]) => {
            const nodes = graphData.nodes;
            const adjacencyList = graphData.adjacency_list;

            // 1. VẼ MẠNG LƯỚI GỐC (Nét mờ màu xám)
            const drawnEdges = new Set();
            for (const u in adjacencyList) {
                for (const v in adjacencyList[u]) {
                    const edgeId = u < v ? `${u}-${v}` : `${v}-${u}`;
                    if (!drawnEdges.has(edgeId)) {
                        drawnEdges.add(edgeId);
                        if (nodes[u] && nodes[v]) {
                            L.polyline([
                                [nodes[u].lat, nodes[u].lon],
                                [nodes[v].lat, nodes[v].lon]
                            ], {
                                color: '#9ca3af', // Màu xám nhạt
                                weight: 2,
                                opacity: 0.5
                            }).addTo(map);
                        }
                    }
                }
            }

// =========================================================
            // 2. VẼ LỘ TRÌNH NGẮN NHẤT (VẼ ĐƯỜNG TRƯỚC, VẼ GA SAU ĐỂ KHÔNG BỊ ĐÈ)
            // =========================================================
            
            const pathCoordinates = [];
            
            // BƯỚC 2.1: Quét 1 vòng chỉ để lấy tọa độ và VẼ ĐƯỜNG RAY
            for (let i = 0; i < pathIds.length; i++) {
                const id = pathIds[i];
                if (nodes[id]) {
                    pathCoordinates.push([nodes[id].lat, nodes[id].lon]);
                }
            }

            // Vẽ vệt đỏ dày nối toàn bộ lộ trình (Nằm ở lớp dưới)
            if (pathCoordinates.length > 0) {
                const pathLine = L.polyline(pathCoordinates, {
                    color: '#ef4444', 
                    weight: 6,        
                    opacity: 1
                }).addTo(map);

                // Tự động zoom bản đồ vừa khít với toàn bộ chuyến đi
                map.fitBounds(pathLine.getBounds());
            }

            // BƯỚC 2.2: Quét vòng lặp lần thứ 2 để VẼ CÁC CHẤM GA TÀU (Nằm ở lớp trên)
            for (let i = 0; i < pathIds.length; i++) {
                const id = pathIds[i];
                if (nodes[id] && nodes[id].is_station) {
                    const latlng = [nodes[id].lat, nodes[id].lon];
                    
                    let markerColor = "#f59e0b"; // Vàng cam cho ga trung gian
                    let markerRadius = 6;
                    let popupText = `<b>Trạm đi qua:</b><br>${nodes[id].name}`;

                    // Điểm xuất phát
                    if (i === 0) {
                        markerColor = "#22c55e"; // Xanh lá
                        markerRadius = 8;        
                        popupText = `<b>🚩 Điểm xuất phát</b><br>${nodes[id].name}`;
                    } 
                    // Điểm đích
                    else if (i === pathIds.length - 1) {
                        markerColor = "#ef4444"; // Đỏ
                        markerRadius = 8;
                        popupText = `<b>🏁 Điểm đích</b><br>${nodes[id].name}`;
                    }

                    // Vẽ marker (Vì lệnh này gọi sau polyline nên nó sẽ nổi lềnh bềnh trên cái vạch đỏ)
                    L.circleMarker(latlng, {
                        radius: markerRadius,
                        fillColor: markerColor,
                        color: "#fff",
                        weight: 2,
                        fillOpacity: 1
                    }).addTo(map).bindPopup(popupText);
                }
            }
        })
        .catch(error => {
            console.error('Lỗi tải dữ liệu:', error);
            alert("Lỗi tải file. Hãy chắc chắn đã chạy bằng Local Server (Live Server / Python http.server) và đã sinh ra file shortest_path.json");
        });
    </script>
</body>
</html>
